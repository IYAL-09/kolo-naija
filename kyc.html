<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Identity Compliance Framework — Naija Kolo</title>

<script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

<style>
@import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&family=JetBrains+Mono:wght@500;700&display=swap');

:root {
  --primary:#10b981;
  --border:rgba(255,255,255,0.08);
}

body {
  font-family:'Plus Jakarta Sans',sans-serif;
  background:#0F172A;
  padding-top:100px;
}

header {
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:75px;
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:0 25px;
  background:rgba(6,17,10,.92);
  backdrop-filter:blur(15px);
  border-bottom:1px solid var(--border);
  z-index:1000;
}

.logo {
  display:flex;
  align-items:center;
  gap:12px;
  font-size:1.4rem;
  font-weight:700;
  color:white;
}

.logo i {
  color:var(--primary);
  font-size:1.8rem;
}

.mono-text { font-family:'JetBrains Mono',monospace; }

.hidden-state { display:none !important; }
</style>
</head>

<body class="text-slate-100">

<header>
  <div class="logo">
    <i class="fas fa-piggy-bank"></i>
    Naija Kolo
  </div>
</header>

<!-- AUTH -->
<div id="authGate" class="hidden-state text-center mt-20">
  <p class="text-slate-400 mb-4">Please login to continue</p>
  <a href="/login" class="bg-emerald-500 text-black px-6 py-3 rounded-xl font-bold">Login</a>
</div>

<!-- APP -->
<div id="appInterface" class="max-w-xl mx-auto p-6">

  <div class="flex justify-between items-center bg-slate-900 p-4 rounded-xl border border-slate-800">
    <span class="text-slate-400">KYC Status</span>
    <span id="kycBadge" class="px-3 py-1 rounded-full text-xs">Checking...</span>
  </div>

  <div id="statusBanner" class="hidden-state mt-4 p-3 rounded-xl border flex gap-2 items-start">
    <span id="bannerIcon"></span>
    <p id="bannerText"></p>
  </div>

  <!-- FORM -->
  <form id="kycForm" class="mt-6 space-y-4 hidden-state" onsubmit="handleVerificationSubmit(event)">

    <div class="grid grid-cols-2 gap-3">
      <button type="button" onclick="setKycType('BVN')" id="btnBVN"
        class="bg-emerald-500/10 border border-emerald-500 text-emerald-400 p-3 rounded-xl">
        BVN
      </button>

      <button type="button" onclick="setKycType('NIN')" id="btnNIN"
        class="bg-slate-900 border border-slate-800 text-slate-400 p-3 rounded-xl">
        NIN
      </button>
    </div>

    <input id="identityNumber"
      maxlength="11"
      inputmode="numeric"
      oninput="this.value=this.value.replace(/\D/g,'')"
      class="w-full p-3 bg-slate-950 border border-slate-800 rounded-xl"
      placeholder="Enter 11-digit BVN/NIN"
    />

    <button id="submitBtn"
      class="w-full bg-emerald-500 text-black font-bold p-4 rounded-xl">
      Submit Verification
    </button>
  </form>

  <!-- ACCOUNTS -->
  <div id="accountsDashboard" class="hidden-state mt-6">
    <h3 class="text-sm text-slate-400 mb-3">Your Accounts</h3>
    <div id="accountsWrapper"></div>
  </div>

</div>

<script>
const SUPABASE_URL = "https://mgihqnbcbjzingerefrk.supabase.co";
const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im1naWhxbmJjYmp6aW5nZXJlZnJrIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODI1NjA4NTUsImV4cCI6MjA5ODEzNjg1NX0.r4lCuJZjIaBxXHYlmzPf5ho-TUZnxr4XA__g_vdiEMU";

const sb = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

let activeKycType = "BVN";
let sessionUser = null;

const authGate = document.getElementById("authGate");
const appInterface = document.getElementById("appInterface");
const kycBadge = document.getElementById("kycBadge");
const kycForm = document.getElementById("kycForm");
const accountsDashboard = document.getElementById("accountsDashboard");
const accountsWrapper = document.getElementById("accountsWrapper");

window.onload = async () => {
  const { data } = await sb.auth.getSession();
  handleSession(data.session);

  sb.auth.onAuthStateChange((_e, session) => {
    handleSession(session);
  });
};

function handleSession(session) {
  sessionUser = session?.user || null;

  if (!sessionUser) {
    authGate.classList.remove("hidden-state");
    appInterface.classList.add("hidden-state");
    return;
  }

  authGate.classList.add("hidden-state");
  appInterface.classList.remove("hidden-state");

  syncKyc(sessionUser.id);
}

async function syncKyc(userId) {
  const { data } = await sb
    .from("kyc_profiles")
    .select("status, verification_error")
    .eq("id", userId)
    .maybeSingle();

  const status = data?.status || "unverified";

  renderStatus(status, data?.verification_error);

  if (status === "verified") {
    loadAccounts(userId);
  }
}

function renderStatus(status, error) {
  kycBadge.innerText = status;

  kycForm.classList.add("hidden-state");
  accountsDashboard.classList.add("hidden-state");

  if (status === "verified") {
    kycBadge.className = "bg-emerald-500/10 text-emerald-400 px-3 py-1 rounded-full text-xs";
    autoRedirect();
  }

  else if (status === "pending") {
    kycBadge.className = "bg-amber-500/10 text-amber-400 px-3 py-1 rounded-full text-xs";
    kycForm.classList.add("hidden-state");
  }

  else if (status === "failed") {
    kycBadge.className = "bg-red-500/10 text-red-400 px-3 py-1 rounded-full text-xs";
    kycForm.classList.remove("hidden-state");
  }

  else {
    kycBadge.className = "bg-slate-800 text-slate-400 px-3 py-1 rounded-full text-xs";
    kycForm.classList.remove("hidden-state");
  }
}

function setKycType(type) {
  activeKycType = type;
}

async function handleVerificationSubmit(e) {
  e.preventDefault();

  const identity = document.getElementById("identityNumber").value;

  if (identity.length !== 11) {
    alert("Invalid ID");
    return;
  }

  kycBadge.innerText = "pending";

  try {
    const { data, error } = await sb.functions.invoke("verify-kyc-identity", {
      body: {
        kycType: activeKycType,
        identityNumber: identity
      }
    });

    if (error || !data?.success) {
      throw new Error(data?.message || error?.message);
    }

    await syncKyc(sessionUser.id);

  } catch (err) {
    kycBadge.innerText = "failed";
    alert(err.message);
  }
}

async function loadAccounts(userId) {
  const { data } = await sb
    .from("monnify_accounts")
    .select("*")
    .eq("user_id", userId);

  accountsWrapper.innerHTML = "";

  data?.forEach(acc => {
    const div = document.createElement("div");
    div.className = "p-3 bg-slate-900 rounded-xl border border-slate-800 mb-2";
    div.innerHTML = `
      <div class="text-emerald-400 text-xs">${acc.bank_name}</div>
      <div class="font-bold mono-text">${acc.account_number}</div>
    `;
    accountsWrapper.appendChild(div);
  });

  accountsDashboard.classList.remove("hidden-state");
}

function autoRedirect() {
  setTimeout(() => {
    window.location.href = "/dashboard.html";
  }, 3000);
}
</script>

</body>
</html>
